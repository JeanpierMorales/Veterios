{% load static %}
<header class="dashboard-header text-white shadow-sm">
    <div class="d-flex align-items-center">
        <button class="btn btn-light rounded-3 px-3 py-1 me-4 shadow-sm" id="btnToggle">
            <i class="bi bi-list fs-3 text-turquesa"></i>
        </button>
        {# Usamos la variable 'title' que pases desde el contexto de la vista #}
        <h2 class="m-0 fw-bold">{{ title }}</h2>
    </div>
    <div class="profile-avatar-container">
        <img src="{% static 'img/default_user.png' %}" alt="Perfil" style="width:100%; height:100%; object-fit:cover;">
    </div>
</header>
